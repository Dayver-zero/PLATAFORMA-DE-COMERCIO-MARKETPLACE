# =============================================
# CONFIGURACIÓN DE BASE DE DATOS MYSQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/marketplace_pacccioli?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=nano123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# =============================================
# Actualiza automáticamente el esquema de la base de datos
spring.jpa.hibernate.ddl-auto=create
# Muestra las consultas SQL en consola (útil para desarrollo)
spring.jpa.show-sql=true
# Formato de las consultas SQL
spring.jpa.properties.hibernate.format_sql=true
# Dialecto de MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
# CONFIGURACIÓN DEL SERVIDOR
# =============================================
server.port=8080
# server.servlet.context-path=/api (se quitó porque los controllers ya incluyen /api)

# =============================================
# CONFIGURACIÓN DE LOGGING
# =============================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.marketplace.pacccioli=DEBUG

# =============================================
# CONFIGURACIÓN DE JWT (TOKENS)
# =============================================
# Clave secreta para firmar tokens (DEBE CAMBIARSE EN PRODUCCIÓN)
jwt.secret=miClaveSecretaParaFirmarTokensJWT2024PlataformaComercioLocal
# Tiempo de expiración del token en milisegundos (24 horas)
jwt.expiration=86400000

# =============================================
# CONFIGURACIÓN DE APIs EXTERNAS
# =============================================
# API Key de OpenWeather (obtener en https://openweathermap.org/api)
# La key real va en application-local.properties (no versionado)
spring.config.import=optional:classpath:application-local.properties
openweather.api.key=

# API Key de Google Maps (obtener en https://console.cloud.google.com/)
google.maps.api.key=

# =============================================
# CONFIGURACIÓN DE SUBIDA DE ARCHIVOS
# =============================================
# Tamaño máximo de archivo para subida de imágenes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
# Directorio donde se guardan los archivos subidos
app.upload.dir=uploads

# =============================================
# CONFIGURACIÓN DE RECOMENDACIONES
# =============================================
# Radio de búsqueda predeterminado en kilómetros
recomendacion.radio-busqueda-predeterminado=5
# Número máximo de recomendaciones a retornar
recomendacion.max-recomendaciones=20
# Peso de cada factor en recomendación híbrida (debe sumar 1.0)
recomendacion.peso-clima=0.3
recomendacion.peso-ubicacion=0.3
recomendacion.peso-historial=0.4
